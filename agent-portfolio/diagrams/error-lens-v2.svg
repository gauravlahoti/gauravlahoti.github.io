  <text x="560" y="544" class="step-num" fill="#00FFD1" text-anchor="middle" data-step-circle="4">4</text>

  <!-- Step 5a: on GCP Knowledge → Developer Knowledge arrow -->
  <circle cx="496" cy="755" r="12" fill="#0E1A19" stroke="#00FFD1" stroke-width="1.5" data-step-circle="5a"/>
  <text x="496" y="759" class="step-num" fill="#00FFD1" text-anchor="middle" data-step-circle="5a">5a</text>

  <!-- Step 5b: on Community Search → Google Search arrow -->
  <circle cx="636" cy="755" r="12" fill="#0E1A19" stroke="#00FFD1" stroke-width="1.5" data-step-circle="5b"/>
  <text x="636" y="759" class="step-num" fill="#00FFD1" text-anchor="middle" data-step-circle="5b">5b</text>

  <!-- Step 6: CENTERED on sage→KB-agent horizontal line (x=701.5 midpoint of 650→753) -->
  <circle cx="702" cy="412" r="12" fill="#0E1A19" stroke="#00FFD1" stroke-width="1.5" data-step-circle="6"/>
  <text x="702" y="416" class="step-num" fill="#00FFD1" text-anchor="middle" data-step-circle="6">6</text>

  <!-- Step 7: on KB-agent→toolbox vertical at x=970, BELOW MCP tools label -->
  <circle cx="970" cy="540" r="12" fill="#0E1A19" stroke="#00FFD1" stroke-width="1.5" data-step-circle="7"/>
  <text x="970" y="544" class="step-num" fill="#00FFD1" text-anchor="middle" data-step-circle="7">7</text>

  <!-- Step 8: on toolbox→AlloyDB vertical at x=970, BELOW pgvector label -->
  <circle cx="970" cy="748" r="12" fill="#0E1A19" stroke="#00FFD1" stroke-width="1.5" data-step-circle="8"/>
  <text x="970" y="752" class="step-num" fill="#00FFD1" text-anchor="middle" data-step-circle="8">8</text>

  <!-- Step 9: on vertical segment of Hub→PDF path -->
  <circle cx="240" cy="332" r="12" fill="#0E1A19" stroke="#00FFD1" stroke-width="1.5" data-step-circle="9"/>
  <text x="240" y="336" class="step-num" fill="#00FFD1" text-anchor="middle" data-step-circle="9">9</text>

  <!-- Animation flow data -->
  <g class="anim-data" style="display:none">
    <g data-traveler-path="520,134 520,168 620,168 620,202" data-color="#00FFD1" data-step="1" data-delay="0"/>
    <g data-traveler-path="360,300 360,354" data-color="#00FFD1" data-step="2" data-delay="0.7"/>
    <g data-traveler-path="560,300 560,354" data-color="#00FFD1" data-step="3" data-delay="1.4"/>
    <g data-traveler-path="560,470 560,565" data-color="#00FFD1" data-step="4" data-delay="2.1"/>
    <g data-traveler-path="496,709 496,773" data-color="#00FFD1" data-step="5a" data-delay="2.8"/>
    <g data-traveler-path="636,709 636,773" data-color="#00FFD1" data-step="5b" data-delay="2.8"/>
    <g data-traveler-path="650,412 753,412" data-color="#00FFD1" data-step="6" data-delay="3.5"/>
    <g data-traveler-path="970,478 970,558" data-color="#00FFD1" data-step="7" data-delay="4.2"/>
    <g data-traveler-path="970,701 970,773" data-color="#00FFD1" data-step="8" data-delay="4.9"/>
    <g data-traveler-path="360,470 360,515 770,515 770,558" data-color="#00FFD1" data-step="hot" data-delay="0.7"/>
