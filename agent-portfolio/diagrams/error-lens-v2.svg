  <text x="496" y="641" class="node-sub" text-anchor="middle">Agent</text>
  <text x="496" y="665" class="node-sub" text-anchor="middle">Official GCP</text>
  <text x="496" y="681" class="node-sub" text-anchor="middle">docs grounding</text>

  <rect x="574" y="585" width="124" height="124" rx="8" fill="#0F0F0F" stroke="#555555" stroke-width="1.5"/>
  <image href="/diagram-icons/adk.png" x="626" y="590" width="20" height="20"/>
  <text x="636" y="625" class="node-sub" text-anchor="middle">Community</text>
  <text x="636" y="641" class="node-sub" text-anchor="middle">Search Agent</text>
  <text x="636" y="665" class="node-sub" text-anchor="middle">SO · Reddit</text>
  <text x="636" y="681" class="node-sub" text-anchor="middle">GitHub Issues</text>

  <!-- KB Toolbox Cloud Run boundary (label CENTERED on top edge) -->
  <rect x="760" y="565" width="260" height="148" rx="12" fill="none" stroke="#666666" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="835" y="557" width="110" height="20" fill="#000000"/>
  <image href="/diagram-icons/cloud-run.svg" x="846" y="559" width="14" height="14"/>
  <text x="865" y="572" class="caption">Cloud Run</text>

  <rect x="772" y="581" width="236" height="120" rx="8" fill="#0F0F0F" stroke="#555555" stroke-width="1.5"/>
  <text x="890" y="611" class="node-title" text-anchor="middle">error-kb-toolbox</text>
  <text x="890" y="631" class="node-sub" text-anchor="middle">MCP Toolbox for Databases</text>
  <text x="890" y="649" class="node-sub" text-anchor="middle">6 SQL tools · pgvector</text>
  <text x="890" y="667" class="node-sub" text-anchor="middle">Streamable HTTP</text>
  <text x="890" y="685" class="node-sub" text-anchor="middle">REST endpoints</text>

