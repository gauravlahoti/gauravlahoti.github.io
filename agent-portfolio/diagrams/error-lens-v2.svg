  <!-- Box A: Developer Knowledge (Managed MCP Server) — under GCP Knowledge Agent -->
  <rect x="420" y="780" width="140" height="100" rx="8" fill="#0F0F0F" stroke="#555555" stroke-width="1.5"/>
  <image href="/diagram-icons/google-cloud.png" x="430" y="790" width="24" height="24"/>
  <text x="490" y="824" class="node-title" text-anchor="middle" style="font-size:13px">Developer</text>
  <text x="490" y="842" class="node-title" text-anchor="middle" style="font-size:13px">Knowledge</text>
  <text x="490" y="864" class="node-sub" text-anchor="middle">Managed MCP Server</text>

  <!-- Box B: Google Search (under Community Search Agent) -->
  <rect x="568" y="780" width="140" height="100" rx="8" fill="#0F0F0F" stroke="#555555" stroke-width="1.5"/>
  <image href="/diagram-icons/google-search.png" x="578" y="790" width="24" height="24"/>
  <text x="638" y="830" class="node-title" text-anchor="middle" style="font-size:13px">Google Search</text>
  <text x="638" y="848" class="node-sub" text-anchor="middle">Community</text>
  <text x="638" y="864" class="node-sub" text-anchor="middle">SO · Reddit · GH</text>

  <!-- AlloyDB aligned with other row 5 boxes (y=780-880) -->
  <rect x="760" y="780" width="260" height="100" rx="8" fill="#0F0F0F" stroke="#555555" stroke-width="1.5"/>
