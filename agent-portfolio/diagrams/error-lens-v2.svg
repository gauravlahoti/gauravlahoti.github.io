  <polyline points="360,470 360,515 770,515 770,558" fill="none" stroke="#00FFD1" stroke-width="1.5" stroke-linejoin="miter" stroke-dasharray="6 4" marker-end="url(#arr-acc)"/>
  <!-- Label positioned on the RIGHT half of the horizontal segment, clear of sage→Parallel arrow at x=560 and step 4 -->
  <rect x="585" y="499" width="140" height="16" rx="3" fill="#000000"/>
  <text x="655" y="511" class="edge-label" fill="#00FFD1" text-anchor="middle">Direct KB lookup</text>

  <!-- 7. error-kb-agent → error-kb-toolbox (std). Rerouted to enter at x=970 to avoid the centered Cloud Run label at x=835-945. -->
  <polyline points="970,478 970,558" fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linejoin="miter" marker-end="url(#arr-std)"/>
  <!-- "MCP tools" label to LEFT of arrow, well clear of step circle -->
  <rect x="884" y="498" width="62" height="16" rx="3" fill="#000000"/>
  <text x="915" y="510" class="edge-label" text-anchor="middle">MCP tools</text>

  <!-- 8. error-kb-toolbox → AlloyDB (std). Arrow ends 7px before AlloyDB top (y=780). -->
  <polyline points="970,701 970,773" fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linejoin="miter" marker-end="url(#arr-std)"/>
  <rect x="862" y="715" width="80" height="16" rx="3" fill="#000000"/>
  <text x="902" y="727" class="edge-label" text-anchor="middle">pgvector SQL</text>

  <!-- ═══════════ STEP CIRCLES ═══════════ -->

  <!-- Step 1: on Dev→Hub initial vertical, above the bend and above the Cloud Run boundary -->
  <circle cx="520" cy="150" r="12" fill="#0E1A19" stroke="#00FFD1" stroke-width="1.5" data-step-circle="1"/>
  <text x="520" y="154" class="step-num" fill="#00FFD1" text-anchor="middle" data-step-circle="1">1</text>

  <!-- Step 2: midpoint of Hub→quick_scan -->
  <circle cx="360" cy="326" r="12" fill="#0E1A19" stroke="#00FFD1" stroke-width="1.5" data-step-circle="2"/>
  <text x="360" y="330" class="step-num" fill="#00FFD1" text-anchor="middle" data-step-circle="2">2</text>

  <!-- Step 3: midpoint of Hub→sage -->
  <circle cx="560" cy="326" r="12" fill="#0E1A19" stroke="#00FFD1" stroke-width="1.5" data-step-circle="3"/>
  <text x="560" y="330" class="step-num" fill="#00FFD1" text-anchor="middle" data-step-circle="3">3</text>

  <!-- Step 4: midway between hot path (y=515) and Parallel Research boundary (y=565); circle 540±12 = 528-552 -->
