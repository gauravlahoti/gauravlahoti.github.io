  <text x="816" y="831" class="node-sub">pgvector · 768-dim vectors</text>
  <text x="816" y="847" class="node-sub">Vertex AI text-embedding-005</text>
  <text x="816" y="863" class="node-sub">cosine similarity ≥ 0.85</text>

  <!-- ═══════════ EDGES ═══════════ -->

  <!-- 1. Developer → Hub (acc). Rerouted with a small bend to avoid passing through the CENTERED Cloud Run label at x=465-575. -->
  <polyline points="520,134 520,168 620,168 620,202" fill="none" stroke="#00FFD1" stroke-width="1.5" stroke-linejoin="miter" marker-end="url(#arr-acc)"/>

  <!-- Hub → Gemini (std) — emerges from the Cloud Run boundary right edge (x=700) -->
  <polyline points="700,251 753,251" fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linejoin="miter" marker-end="url(#arr-std)"/>
  <rect x="702" y="226" width="60" height="16" rx="3" fill="#000000"/>
  <text x="732" y="238" class="edge-label" text-anchor="middle">inference</text>

  <!-- 9. Hub → PDF Report (std) — emerges from the Cloud Run boundary left edge (x=340) -->
  <polyline points="340,251 240,251 240,414 223,414" fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linejoin="miter" marker-end="url(#arr-std)"/>
  <rect x="254" y="226" width="84" height="16" rx="3" fill="#000000"/>
  <text x="296" y="238" class="edge-label" text-anchor="middle">generate PDF</text>

  <!-- 2. Hub → quick_scan (std) -->
  <polyline points="360,300 360,354" fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linejoin="miter" marker-end="url(#arr-std)"/>

  <!-- 3. Hub → sage_pipeline (std) -->
  <polyline points="560,300 560,354" fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linejoin="miter" marker-end="url(#arr-std)"/>

