  <rect x="432" y="557" width="120" height="20" fill="#000000"/>
  <text x="492" y="572" class="caption" text-anchor="middle">Parallel Research</text>

  <rect x="434" y="585" width="124" height="124" rx="8" fill="#0F0F0F" stroke="#555555" stroke-width="1.5"/>
