<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 920" width="1040" height="920" style="background:#000000">
  <defs>
    <style>
      text { font-family: 'Cascadia Code', 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace; }
