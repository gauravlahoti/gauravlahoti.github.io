  <text x="360" y="420" class="node-sub" text-anchor="middle">Signal extract</text>
  <text x="360" y="436" class="node-sub" text-anchor="middle">+ KB vector search</text>
  <text x="360" y="452" class="node-sub" text-anchor="middle">Sequential</text>

  <rect x="470" y="354" width="180" height="116" rx="8" fill="#0F0F0F" stroke="#555555" stroke-width="1.5"/>
  <text x="560" y="382" class="node-title" text-anchor="middle">sage_pipeline</text>
  <text x="560" y="402" class="node-sub" text-anchor="middle">— Full Research —</text>
  <text x="560" y="420" class="node-sub" text-anchor="middle">Research + record</text>
  <text x="560" y="436" class="node-sub" text-anchor="middle">+ confidence score</text>
  <text x="560" y="452" class="node-sub" text-anchor="middle">Sequential</text>

  <!-- KB Agent Cloud Run boundary (label CENTERED on top edge) -->
  <rect x="760" y="342" width="260" height="148" rx="12" fill="none" stroke="#666666" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="835" y="334" width="110" height="20" fill="#000000"/>
  <image href="/diagram-icons/cloud-run.svg" x="846" y="336" width="14" height="14"/>
  <text x="865" y="349" class="caption">Cloud Run</text>

  <rect x="772" y="358" width="236" height="120" rx="8" fill="#0F0F0F" stroke="#555555" stroke-width="1.5"/>
  <image href="/diagram-icons/adk.png" x="784" y="372" width="20" height="20"/>
  <text x="812" y="390" class="node-title">error-kb-agent</text>
  <text x="812" y="410" class="node-sub">A2A · KB Manager</text>
  <text x="812" y="428" class="node-sub">Skill-driven workflows</text>
  <text x="812" y="446" class="node-sub">search · log · resolve · list</text>
  <text x="812" y="464" class="node-sub">before_tool_callback gate</text>

