  <polyline points="650,412 753,412" fill="none" stroke="#00FFD1" stroke-width="1.5" stroke-linejoin="miter" marker-end="url(#arr-acc)"/>
  <!-- A2A label ABOVE the line so step 6 can sit at the line midpoint -->
  <rect x="674" y="380" width="56" height="16" rx="3" fill="#000000"/>
  <text x="702" y="392" class="edge-label" text-anchor="middle">A2A call</text>

  <!-- 4. sage → Parallel Research (std). Longer 95px segment for step 4 breathing room. -->
