  <rect x="642" y="728" width="74" height="16" rx="3" fill="#000000"/>
  <text x="679" y="740" class="edge-label" text-anchor="middle">web search</text>

  <!-- HOT PATH: quick_scan (KB HIT) → error-kb-toolbox (bypasses sage_pipeline + all parallel research) -->
